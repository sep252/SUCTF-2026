<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SU_MvsicPlayer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>SU_MvsicPlayer</h1><br />
        <div class="row row-open">
          <button id="openBtn" class="icon-btn" title="Open .su_mv">
            <img src="./icons/upload.png" alt="Open file" />
          </button>
          <span id="fileHint">No file loaded</span>
        </div>

        <div class="row">
          <label class="checkline">
            <input id="secureToggle" type="checkbox" />
            Enable secure storage on finish/close
          </label>
        </div>

        <div class="controls">
          <button id="seekBackBtn" class="icon-btn" title="-10s">
            <img src="./icons/prev.png" alt="Backward 10s" />
          </button>
          <button id="playPauseBtn" class="icon-btn" title="Play/Pause">
            <img id="playPauseIcon" src="./icons/play.png" alt="Play/Pause" />
          </button>
          <button id="seekForwardBtn" class="icon-btn" title="+10s">
            <img src="./icons/next.png" alt="Forward 10s" />
          </button>
        </div>

        <div class="timeline">
          <input id="seekBar" type="range" min="0" max="100" value="0" />
          <div class="timebar">
            <span id="currentTime">00:00</span>
            <span id="totalTime">00:00</span>
          </div>
        </div>
      </section>
    </main>

    <audio id="audioElement"></audio>
    <script src="../common/sumv-browser.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
