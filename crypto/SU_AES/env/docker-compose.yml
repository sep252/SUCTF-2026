name: su_block_gamma

services:
  su_block_gamma:
    build:
      context: ..
      dockerfile: env/Dockerfile
    container_name: su_block_gamma
    environment:
      - PORT=9999
      - FLAG=${FLAG:-flag{a63b4d37-7681-4850-b6a7-0d7109febb19}}
      # Optional alternatives used by different platforms:
      # - GZCTF_FLAG=${GZCTF_FLAG:-}
      # - DASCTF=${DASCTF:-}
    ports:
      - "9999:9999"
    restart: unless-stopped