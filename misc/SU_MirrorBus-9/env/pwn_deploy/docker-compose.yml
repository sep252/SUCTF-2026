version: "3"
services:
  mirrorbus9:
    build: .
    image: mirrorbus9:latest
    ports:
      - "9999:9999"
    environment:
      - MB9_SEED=mirrorbus9-demo-seed
      - MB9_SESSION_SEED_MODE=per_connection
      - MB9_MAX_COMMANDS=4096
      - MB9_MAX_TICK=20000
      - MB9_STATE_AMP=2
      - MB9_OBS_AMP=6
      - MB9_DELAY_MIN=0
      - MB9_DELAY_SPAN=1
      - MB9_ARM_TTL=192
      - MB9_PROVE_ATTEMPTS=7

